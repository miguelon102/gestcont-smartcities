services:
  mongo:
    image: mongo:6.0
    container_name: db-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - fiware-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  orion:
    image: fiware/orion:4.0.0
    container_name: fiware-orion
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "127.0.0.1:1026:1026"
    networks:
      - fiware-network
    command: >
      -dbURI mongodb://mongo:27017
      -logLevel INFO

networks:
  fiware-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local